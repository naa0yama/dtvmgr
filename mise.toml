[env]
RUSTC_WRAPPER = "sccache"

[tools]
dprint = "0.52.0"
actionlint = "1.7.11"
ghalint = "1.5.3"
zizmor = "1.16.0"
"aqua:ast-grep/ast-grep" = "0.41.0"
"aqua:taiki-e/cargo-llvm-cov" = "0.8.4"
"github:rust-secure-code/cargo-auditable" = "0.7.4"
"aqua:EmbarkStudios/cargo-deny" = "0.19.0"
"aqua:watchexec/cargo-watch" = "8.5.3"
usage = "2.18.2"

[tasks.setup]
description = "Initial project setup"
run = "chmod +x .githooks/*"

[tasks.build]
description = "Debug build"
run = "cargo build"

[tasks."build:release"]
description = "Release build (with auditable dependency info)"
run = "cargo auditable build --release"

[tasks."build:timings"]
description = "Build with timing analysis"
run = "cargo build --timings"

[tasks.check]
description = "Compile check"
run = "cargo check --all-targets --all-features"

[tasks.test]
description = "Run tests"
run = "cargo test --all-targets"

[tasks."test:watch"]
description = "TDD watch mode"
run = "cargo watch -x 'test --all-targets'"

[tasks."test:doc"]
description = "Run doc tests"
run = "cargo test --doc"

[tasks.coverage]
description = "Generate LCOV coverage report"
run = "cargo llvm-cov --lcov --output-path target/lcov.info"

[tasks."coverage:html"]
description = "Generate HTML coverage report and open"
run = "cargo llvm-cov --html --open"

[tasks.fmt]
description = "Run all formatters"
run = """
cargo fmt
dprint fmt
"""

[tasks."fmt:check"]
description = "Check all formatting"
run = """
cargo fmt -- --check
dprint check
"""

[tasks.clippy]
description = "Run clippy lints"
run = "cargo clippy --all-targets --all-features"

[tasks."clippy:strict"]
description = "Run clippy lints (warnings as errors)"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.ast-grep]
description = "Run ast-grep custom rules check"
run = "sg scan --error --color never"

[tasks.lint]
description = "Run all lints"
depends = ["fmt:check", "clippy:strict", "ast-grep"]

[tasks."lint:gh"]
description = "Lint GitHub Actions workflows"
run = """
actionlint
ghalint run
ghalint run-action
zizmor --persona=pedantic .github/
"""

[tasks.audit]
description = "Audit dependencies"
run = "cargo audit"

[tasks.deny]
description = "Check licenses and dependencies"
run = "cargo deny check"

[tasks.miri]
description = "Run Miri to detect undefined behavior"
run = "cargo +nightly miri test"

[tasks.pre-commit]
description = "Pre-commit checks (fast)"
depends = ["clean:sweep", "fmt:check", "clippy:strict", "ast-grep", "lint:gh"]

[tasks.pre-push]
description = "Pre-push checks (comprehensive)"
depends = ["lint", "test", "coverage", "build:release", "lint:gh"]

[tasks.clean]
description = "Remove target directory entirely"
run = "cargo clean"

[tasks."clean:sweep"]
description = "Remove build artifacts older than 1 day"
run = "cargo sweep --time 1"

[tasks."clean:cache"]
description = "Show cargo cache info and clean registry cache"
run = """
cargo cache
cargo cache --autoclean
"""
