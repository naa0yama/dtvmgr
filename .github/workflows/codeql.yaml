# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  analyze:
    name: codeql-analyze
    permissions:
      contents: read # Required to checkout the repository for CodeQL analysis
      security-events: write # Required to upload CodeQL analysis results
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
        with:
          languages: rust
          build-mode: none
          config-file: .github/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
        with:
          category: codeql
