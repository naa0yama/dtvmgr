# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Docs CI
on:
  workflow_call: {}
  workflow_dispatch:

permissions: {}

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  dprint:
    name: dprint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # Required to checkout the repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache dprint plugins
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/dprint
          key: dprint-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('dprint.jsonc') }}
          restore-keys: |
            dprint-v1-${{ runner.os }}-${{ runner.arch }}-

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          install_args: dprint
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check formatting
        run: dprint check
