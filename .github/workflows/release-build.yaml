# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release Build
on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag"
        required: true
        type: string
    outputs:
      artifacts:
        description: "List of built artifacts"
        value: ${{ jobs.build-matrix.outputs.artifacts }}

permissions: {}

concurrency:
  group: release-build-${{ inputs.tag }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build-matrix:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read # Required to checkout the repository
      actions: write # Required to upload artifacts
      id-token: write # Required for build provenance attestation
      attestations: write # Required for build provenance attestation
    outputs:
      artifacts: ${{ steps.collect-artifacts.outputs.artifacts }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract tool versions
        id: versions
        run: |
          sccache_version=$(grep -E '^ARG SCCACHE_VERSION=v?[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | sed -E 's/ARG SCCACHE_VERSION=(v?[0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          auditable_version=$(grep -E 'cargo-auditable' mise.toml | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')

          # For workspace projects, find the CLI crate that defines the [[bin]] target
          cli_toml="crates/dtvmgr-cli/Cargo.toml"
          binary_name=$(grep -E '^\[\[bin\]\]' -A 5 "$cli_toml" | grep -E '^name = "' | head -n 1 | sed -E 's/name = "(.*)"/\1/')

          if [ -z "$binary_name" ]; then
            echo "ERROR: Could not determine binary name from ${cli_toml}"
            exit 1
          fi

          {
            echo "sccache=${sccache_version}"
            echo "auditable=${auditable_version}"
            echo "binary_name=${binary_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Rust setup
        uses: ./.github/actions/act-setup-rust
        with:
          sccache: ${{ steps.versions.outputs.sccache }}

      - name: Install cargo-auditable
        uses: taiki-e/install-action@94a7388bec5d4c8dd93e3ebf09e0ff448f3f6f4d # v2.68.35
        with:
          tool: cargo-auditable@${{ steps.versions.outputs.auditable }}

      - name: Build release binary
        env:
          TARGET: ${{ matrix.target }}
          BINARY_NAME: ${{ steps.versions.outputs.binary_name }}
        run: |
          set -euxo pipefail
          cargo auditable build --release --target "${TARGET}" --bin "${BINARY_NAME}" --verbose

      - name: Upload binary artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        env:
          BINARY_NAME: ${{ steps.versions.outputs.binary_name }}
          TAG: ${{ inputs.tag }}
          TARGET: ${{ matrix.target }}
        with:
          name: ${{ env.BINARY_NAME }}-${{ env.TAG }}-${{ env.TARGET }}
          path: target/${{ env.TARGET }}/release/${{ env.BINARY_NAME }}
          if-no-files-found: error
          retention-days: 7

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        env:
          BINARY_NAME: ${{ steps.versions.outputs.binary_name }}
          TARGET: ${{ matrix.target }}
        with:
          subject-path: target/${{ env.TARGET }}/release/${{ env.BINARY_NAME }}

      - name: Collect artifact info
        id: collect-artifacts
        env:
          BINARY_NAME: ${{ steps.versions.outputs.binary_name }}
          TAG: ${{ inputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          artifact_name="${BINARY_NAME}-${TAG}-${TARGET}"
          binary_path="target/${TARGET}/release/${BINARY_NAME}"
          echo "artifacts=${artifact_name}:${binary_path}" >> "$GITHUB_OUTPUT"
