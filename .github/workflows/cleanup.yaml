# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Cleanup
on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  cleanup:
    name: cleanup
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write # Required to manage GitHub Actions artifacts
      packages: write # Required to delete package versions
    steps:
      - name: Cleanup caches and check container package
        id: cleanup
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const branch = context.payload.pull_request?.head?.ref ?? context.ref.replace('refs/heads/', '');
            const ref = `refs/heads/${branch}`;

            // Delete caches for the branch
            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { ...context.repo, ref },
            );
            for (const cache of caches) {
              console.log(`Deleting cache: ${cache.key}`);
              await github.rest.actions.deleteActionsCacheById({
                ...context.repo,
                cache_id: cache.id,
              });
            }
            console.log(`Deleted ${caches.length} caches`);

            // Check container package exists
            const packageName = context.repo.repo.toLowerCase() + '/devcontainer';
            try {
              await github.rest.packages.getPackageForUser({
                package_type: 'container',
                package_name: packageName,
                username: context.repo.owner,
              });
              core.setOutput('package_exists', 'true');
            } catch (e) {
              if (e.status === 404) {
                core.setOutput('package_exists', 'false');
              } else {
                throw e;
              }
            }

      - name: Delete untagged containers
        if: steps.cleanup.outputs.package_exists == 'true'
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          package-name: ${{ github.event.repository.name }}/devcontainer
          package-type: "container"
          min-versions-to-keep: 0
          delete-only-untagged-versions: true
